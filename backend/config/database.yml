default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST", "db") %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>
  username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "postgres") %>

development:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "scout_development") %>

test:
  <<: *default
  database: <%= ENV.fetch("TEST_DB_NAME", "scout_test") %>

production:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "scout_production") %>
